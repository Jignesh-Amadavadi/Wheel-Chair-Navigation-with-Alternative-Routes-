<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>LBS-Project</title>
	<!-- Flatpickr CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

	<!-- Flatpickr JS -->
	<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
	<!-- improve accessibility on mobile phones -->
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- set the icon displayed on the tab of the webpage -->

	<!-- import font 'Fira' -->
	<link rel="stylesheet" href="https://code.cdn.mozilla.net/fonts/fira.css">

	<!-- import jQuery -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.3.12/proj4.js" type="text/javascript"></script>

	<!-- import OpenLayers -->
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.9.0/css/ol.css" type="text/css">
	<script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.9.0/build/ol.js"></script>

	<!-- own script -->
	<script src="js/scripttest.js" defer></script>
	<link rel="stylesheet" href="js/styles.css">

	<!-- proj4 für die Projektionen -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.3.12/proj4.js" type="text/javascript"></script>

	<style>
		html,
		body {
			margin: 0;
			padding: 0;
			height: 100%;
		}

		.wrapper {
			background-color: rgba(255, 128, 0, 0.2);
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 10px;
		}

		.box {
			flex: 1;
		}

		.boxLeft {
			font-family: Calibri;
		}

		.container {
			height: calc(100% - 50px);
			width: 100%;
			position: relative;
		}

		.map {
			height: 100%;
			width: 100%;
		}

		.buttons {
			position: absolute;
			display: flex;
			flex-direction: column;
			align-items: flex-end;
			right: 0;
			top: 0;
			background-color: rgba(251, 187, 0, 0.2);

		}

		.buttons label,
		.buttons input,
		.buttons button {
			margin-bottom: 5px;
			background-color: rgb(251, 187, 0);
			color: #0a55a1;
			font-weight: 800;
		}

		.buttons label {
			background-color: transparent;
		}

		.buttons button {
			cursor: pointer;
			border-radius: 6px;
			padding: 8px 16px;
		}

		#formSection form {
			padding: 10px;
			display: flex;
    		flex-direction: column;
		}



	</style>

	<script>
		function toggleForm() {
			var form = document.getElementById("formSection");
			form.style.display = form.style.display === "none" ? "block" : "none";
		}


		function toggleLegend() {
			const legend = document.getElementById("slideContainer");
			legend.style.display = legend.style.display === "none" ? "block" : "none";
		}
	</script>
</head>

<body>

	<div id="legend-container">
	  <h3>Route Legend</h3>
	  <ul id="legend-list">

	  </ul>
<!--	  <div id="altPathNavigation">-->
<!--		<button id="altPathLeft" class="nav-button">←</button>-->
<!--		<button id="altPathRight" class="nav-button">→</button>-->


<!--	  </div>-->
	</div>

	<div class="wrapper">
		<div class="box boxLeft">
			<b style="font-family: Arial">
				LBS Exercise -
				MSc/GSD -
				University of Bonn
			</b>
		</div>
		<input class="input" id="isAlternatePathBtn" type="checkbox">
		<label class="label" for="isAlternatePathBtn">
			<div class="left">
				Shortest Path
			</div>
			<div class="switch">
				<span class="slider round"></span>
			</div>
			<div class="right">
				Alternative Paths
			</div>
		</label>
		&
		<input class="input" id="isWheelChair" type="checkbox">
		<label class="label" for="isWheelChair">
			<div class="left">
				Walking
			</div>
			<div class="switch">
				<span class="slider round"></span>
			</div>
			<div class="right">
				Wheelchair
			</div>
		</label>


	<div class="box boxRight">
			<a href="#"> <img id="logo" src="https://upload.wikimedia.org/wikipedia/commons/7/72/Universit%C3%A4t_Bonn.svg"></a>
		</div>
	</div>

	<div class="container">

		<!-- this element will be filled with the map in 'js/main.js' -->
		<div id="map" class="map"></div>
		<!-- When you need to change slope weigth change here -->
		<div class="sliderWrapper">
			<button class="weightsButton" onclick="toggleLegend()" style="display: none;" >Parameters</button>
			<div class="slidecontainer" id="slideContainer" style="display: block;" >

				<div class="inputWrapper">
				  <p>Slope Weight</p>
				  <input type="range" min="0" max="100" value="100" class="slider-input" id="slopeRange">
				  <span id="slopeValue">1.0</span>
				</div>
				<div class="inputWrapper">
				  <p>Local Optimality (&#945)</p>
				  <input type="range" min="0" max="100" value="25" class="slider-input" id="localOptimalityRange">
				  <span id="alphaValue">0.25</span>
				</div>

				<div class="inputWrapper">
				  <p>Shared Edge Restriction (&#947)</p>
				  <input type="range" min="0" max="100" value="80" class="slider-input" id="sharedLengthRestrictionRange">
				  <span id="gammaValue">0.80</span>
				</div>

				<div class="inputWrapper">
				  <p>Length Restriction (&#1013)</p>
				  <input type="range" min="0" max="100" value="25" class="slider-input" id="lengthRestrictionRange">
				  <span id="epsilonValue">0.25</span>
				</div>




			</div>
		</div>
		<div class="buttons">
			<button onclick="toggleForm()">Navigate</button>
			<div id="formSection" style="display: block;">
			<form>
				<label for="coord1">Starting Location:</label>
				<input type="text" id="coord1">
				<br>

				<label for="coord2">Destination:</label>
				<input type="text" id="coord2">
				<br>

				<button id="findPathBtn" type="button" onclick="findPath()">Find Path</button>
				<div id="loadingIndicator" class="loading-indicator" style="display: none;"></div>
			</form>
		</div>
		</div>
	</div>


</body>

</html>
